<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLens - AI Calorie Estimator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1>FoodLens</h1>
            <p>Upload a food photo to detect its class and estimate calories instantly.</p>
        </header>

        <section class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="drop-text">Drag & drop your food image here</p>
                    <p class="drop-subtext">or click to browse files</p>
                </div>
                <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp" hidden>
            </div>
            
            <div id="preview-container" class="preview-container hidden">
                <button id="clear-btn" class="clear-btn" aria-label="Clear image">×</button>
                <img id="image-preview" src="" alt="Food Preview">
            </div>

            <button id="analyze-btn" class="primary-btn" disabled>
                <span class="btn-text">Analyze Food</span>
                <div class="loader hidden"></div>
            </button>
        </section>

        <section id="results-section" class="results-section hidden">
            <h2>Analysis Results</h2>
            <div class="results-grid">
                <div class="result-card">
                    <h3>Food Type</h3>
                    <p id="food-class" class="result-value">--</p>
                </div>
                <div class="result-card">
                    <h3>Estimated Calories</h3>
                    <p id="food-calories" class="result-value highlight">--</p>
                </div>
                <div class="result-card">
                    <h3>Confidence</h3>
                    <p id="food-confidence" class="result-value">--</p>
                </div>
            </div>
            <div id="error-message" class="error-message hidden"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
